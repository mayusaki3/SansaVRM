name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  test:
    name: Test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run SansaVRM test report
        shell: pwsh
        run: .\scripts\test_report.ps1
